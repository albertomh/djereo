_subdirectory: template

project_name:
    help: |
        What is the project called?
           (all-lowercase, may contain underscores)
    type: str
    validator: >-
        {% if not (project_name | regex_search('^[a-z][a-z0-9\_]+$')) %}
        project_name must start with a letter, be lowercase and may contain underscores
        {% endif %}

# https://endoflife.date/python
min_python_version:
    help: "What is the minimum compatible version of Python?"
    type: str
    choices:
        - "3.13"
        - "3.14"
    default: "3.14"

# https://endoflife.date/django
django_version:
    help: "What version of Django do you wish to use?"
    type: str
    choices:
        - "5.2"
        - "6.0"
    default: "6.0"

# https://endoflife.date/postgresql
postgres_version:
    help: "What version of Postgres do you wish to use?"
    type: str
    choices:
        - "16"
        - "17"
        - "18"
    default: "18"

use_htmx:
    help: "Do you wish to use htmx for the frontend?"
    type: bool
    default: yes

use_django_waffle:
    help: "Do you wish to use feature flags? (django-waffle)"
    type: bool
    default: yes

author_name:
    help: "Who is the project's author?"
    type: str
    validator: "{% if author_name == '' %}author_name cannot be empty{% endif %}"

author_email:
    help: "What is the project author's email?"
    type: str
    validator: >-
        {% if not (author_email | regex_search('^[^@]+@[^@]+\.[^@]+$')) %}
        author_email must be an email address
        {% endif %}

initial_version:
    help: "What Semantic Version tag should the project start on?"
    when: false
    type: str
    default: "0.0.0"
    validator: "{% if initial_version == '' %}Must have value{% endif %}"

is_github_project:
    help: |
        Will this project be hosted on GitHub?
           (if 'yes', generates GitHub Actions for 'Release Please', 'prek', 'dependabot')
    type: bool
    default: yes

_message_after_copy: |
    Your project is ready!
    REMINDER:
    - Fill out the `description` and `repository` fields in pyproject.toml.
    - Please update the LICENSE file with your license details.

_tasks:
    - "git init"
    - "uv lock {% if _is_test %}--quiet{% endif %}"
    - "cp .env.in .env"

_envops:
  # Jinja settings to remove whitespace
  lstrip_blocks: true
  trim_blocks: true
